name: ForexFactory Calendar Scraper

# Runs alongside the existing news-scraper workflow in this same repo.
# Hits ForexFactory's calendar feed server-side (GitHub's runners aren't
# subject to browser CORS restrictions) and commits the result to
# output/calendar.json, which premarket_analysis.html then pulls via
# raw.githubusercontent.com -- exactly like it already does for
# output/rss_items.json (NEWS_FEED_URL).

on:
  schedule:
    # Every 6 hours. ForexFactory's own feed is only ~2 requests/5min
    # shared across formats, but this Action calls it far less often than
    # that, so it stays well clear of the limit while keeping the
    # committed calendar reasonably fresh.
    - cron: '0 */6 * * *'
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab

permissions:
  contents: write

jobs:
  scrape-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch ForexFactory calendar
        run: node scripts/scrape-calendar.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/calendar.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update calendar.json [skip ci]"
            git push
          fi
