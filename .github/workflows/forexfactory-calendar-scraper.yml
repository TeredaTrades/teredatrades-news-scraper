name: ForexFactory Calendar Scraper
# Runs alongside the existing news-scraper workflow in this same repo.
# Hits ForexFactory's calendar feed server-side (GitHub's runners aren't
# subject to browser CORS restrictions) and commits the result to
# output/calendar.json, which premarket_analysis.html then pulls via
# raw.githubusercontent.com -- exactly like it already does for
# output/rss_items.json (NEWS_FEED_URL).
#
# ForexFactory's free feed only ever serves the CURRENT week
# (ff_calendar_thisweek.json) -- ff_calendar_lastweek.json and
# ff_calendar_nextweek.json both 404 as of July 2026, confirmed directly.
# So instead of fetching three source URLs, this fetches thisweek only and
# archives every event it's ever seen (scripts/archive-calendar.mjs) to
# reconstruct "last week" once a week rolls over. "Next week" can't be
# reconstructed this way -- no feed can archive forward into the future --
# so the app falls back to its existing CORS-proxy attempts for that one.
on:
  schedule:
    # Every 6 hours. ForexFactory's own feed is only ~2 requests/5min
    # shared across formats, but this Action calls it far less often than
    # that, so it stays well clear of the limit while keeping the
    # committed calendar reasonably fresh.
    - cron: '0 */6 * * *'
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab
permissions:
  contents: write
jobs:
  scrape-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch ForexFactory calendar (thisweek)
        env:
          FF_SOURCE_URL: https://nfs.faireconomy.media/ff_calendar_thisweek.json
          FF_OUTPUT_FILE: output/calendar.json
        run: node scripts/scrape-calendar.mjs

      - name: Update archive & derive lastweek
        run: node scripts/archive-calendar.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/calendar.json output/calendar_archive.json output/calendar_lastweek.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update calendar.json, calendar_archive.json, calendar_lastweek.json [skip ci]"
            git push
          fi
