name: Scrape news feeds

on:
  schedule:
    # Every 15 minutes. Adjust to taste -- GitHub Actions free tier has
    # generous minutes for public repos; for a private repo, watch usage.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit the JSON back

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser

      - name: Run scraper
        run: python3 rss_scraper.py

      - name: Commit updated JSON
        run: |
          git config user.name "news-bot"
          git config user.email "news-bot@users.noreply.github.com"
          git add output/rss_items.json
          git diff --staged --quiet && echo "No changes" || git commit -m "Update news feed [skip ci]"
          git push
